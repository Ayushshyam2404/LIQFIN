name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend Checks
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      # Frontend Checks
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint || echo "Linting failed, but continuing for demonstration"

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # Docker Build Check
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Container Build (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: liquid-finance-api:test

      - name: Test Docker Container Build (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: liquid-finance-web:test
